<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Viewer v3.7 - JSON Markers Export/Import</title>
    <script src="babylon.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; cursor: grab; }
        #renderCanvas:active { cursor: grabbing; }

        #ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; align-items: center; gap: 15px;
            background: rgba(0, 0, 0, 0.75); color: white; padding: 6px 15px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); white-space: nowrap;
        }

        .browser-container { display: flex; align-items: center; gap: 8px; border-right: 1px solid #555; padding-right: 15px; }
        .btn-group { display: flex; gap: 2px; }
        .nav-btn { background: #d35400; color: white; border: none; padding: 4px 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn:hover { background: #e67e22; }
        #reloadBtn { border-radius: 15px 0 0 15px; background: #7f8c8d; }
        #nextBtn { border-radius: 0 15px 15px 0; }

        #filenameDisplay { font-size: 13px; font-weight: bold; color: #f1c40f; min-width: 150px; text-align: center; }
        #cacheStatus { font-size: 9px; color: #aaa; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); }

        .control-group { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .control-group label { display: flex; align-items: center; gap: 3px; cursor: pointer; }

        .action-btn { background: #27ae60; color: white; border: none; padding: 4px 10px; cursor: pointer; font-weight: bold; border-radius: 15px; font-size: 11px; }
        .action-btn.blue { background: #2980b9; }
        .action-btn:hover { opacity: 0.8; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.8); }
        #crosshair::before { top: 0; left: 50%; width: 2px; height: 100%; transform: translateX(-50%); }
        #crosshair::after { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }

        #cropFrame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px dashed #f1c40f; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4); z-index: 50; display: none; pointer-events: none; }
        .handle { position: absolute; width: 16px; height: 16px; background: #f1c40f; border: 1px solid #000; pointer-events: auto; cursor: nwse-resize; }
        .handle.ne { top: -8px; right: -8px; cursor: nesw-resize; }
        .handle.nw { top: -8px; left: -8px; cursor: nwse-resize; }
        .handle.se { bottom: -8px; right: -8px; cursor: nwse-resize; }
        .handle.sw { bottom: -8px; left: -8px; cursor: nesw-resize; }

        #pitch-ui { position: absolute; bottom: 160px; right: 30px; width: 60px; height: 120px; z-index: 10; background: rgba(0,0,0,0.5); border-radius: 0 120px 120px 0; border: 2px solid #3498db; border-left: none; }
        .pitch-scale { position: absolute; right: -35px; height: 100%; width: 40px; display: flex; flex-direction: column; justify-content: space-between; font-size: 10px; color: #3498db; font-weight: bold; padding: 2px 0; }
        #pitch-arrow-wrapper { position: absolute; top: 50%; left: 0; width: 55px; height: 2px; transform-origin: left center; }
        #compass-ui { position: absolute; bottom: 30px; right: 30px; width: 110px; height: 110px; z-index: 10; background: rgba(0,0,0,0.5); border-radius: 50%; border: 2px solid #fff; }
        .compass-label { position: absolute; font-weight: bold; color: white; font-size: 14px; }
        .n { top: 5px; left: 50%; transform: translateX(-50%); }
        .s { bottom: 5px; left: 50%; transform: translateX(-50%); color: #ff4757; }
        .e { right: 8px; top: 50%; transform: translateY(-50%); }
        .w { left: 8px; top: 50%; transform: translateY(-50%); }
        .arrow-wrapper-round { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .needle-round { position: absolute; top: 15%; left: 50%; width: 4px; height: 35%; background: #f1c40f; transform: translateX(-50%); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="browser-container">
            <div class="btn-group">
                <button class="nav-btn" id="reloadBtn" title="Force Reload">🔄</button>
                <button class="nav-btn" id="prevBtn" title="Previous">&lt;</button>
                <button class="nav-btn" id="nextBtn" title="Next">&gt;</button>
            </div>
            <div style="position: relative; margin-left: 5px;">
                <span id="filenameDisplay">...</span>
                <span id="cacheStatus"></span>
            </div>
        </div>
        <div class="control-group">
            <label title="Center View on Load"><input type="checkbox" id="centerView"> Center</label>
            <label title="Toggle horizon"><input type="checkbox" id="showHorizon"> Horizon</label>
            <label title="Grid"><input type="checkbox" id="showGrid"> Grid</label>
            <label title="Crop"><input type="checkbox" id="showCrop"> Crop</label>
            <button id="saveBtn" class="action-btn" title="Save Crop">💾 Save crop</button>
            <button id="exportBtn" class="action-btn blue" title="Export markers to JSON">📤 Export markers</button>
            <button id="importBtn" class="action-btn blue" title="Import markers from JSON">📥 Import markers</button>
            <button id="helpBtn" class="action-btn yellow" title="Guide">Guide</button>
            <input type="file" id="importInput" accept=".json" style="display:none">
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="cropFrame">
        <div class="handle nw"></div><div class="handle ne"></div>
        <div class="handle sw"></div><div class="handle se"></div>
    </div>

    <div id="pitch-ui">
        <div class="pitch-scale"><span>+90°</span><span>0°</span><span>-90°</span></div>
        <div id="pitch-arrow-wrapper"><div style="position: absolute; right: 0; top: -5px; width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 15px solid #f1c40f;"></div></div>
    </div>
    <div id="compass-ui">
        <div class="compass-label n">N</div><div class="compass-label s">S</div>
        <div class="compass-label e">E</div><div class="compass-label w">W</div>
        <div id="compass-arrow-wrapper" class="arrow-wrapper-round"><div class="needle-round"></div></div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        /** CONFIGURATION **/
        let CROP_WIDTH = 800, CROP_HEIGHT = 600;
        const COMPASS_OFFSET_DEGREES = 90, GRID_AZIMUTH_OFFSET = 90, PITCH_OFFSET_DEGREES = 0, GRID_INTERVAL = 10;
        const BASE_DIR_URL = "https://stevealbers.net/allsky/sites/curiosity/cyl/";
        const PROXY_BASE = "https://win98.altervista.org/space/exploration/myp.php?pass=miapass&mode=native&url=";

        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        const compassWrapper = document.getElementById("compass-arrow-wrapper"), pitchWrapper = document.getElementById("pitch-arrow-wrapper");
        const filenameDisplay = document.getElementById("filenameDisplay"), cacheStatus = document.getElementById("cacheStatus"), cropFrame = document.getElementById("cropFrame");

        let currentDome = null, gridParent = null, horizonMesh = null, centerMarker = null;
        let imageList = [], currentIndex = -1;
        const textureCache = {};
        const customCenters = {};

        function updateCropUI() { cropFrame.style.width = CROP_WIDTH + "px"; cropFrame.style.height = CROP_HEIGHT + "px"; }
        updateCropUI();

        /** DEBUG HELPERS **/
        function getImgDeg(alpha, beta) {
            let lon = ((-alpha - Math.PI / 2) * (180 / Math.PI) + 180 + GRID_AZIMUTH_OFFSET) % 360;
            let lat = -(Math.PI / 2 - beta) * (180 / Math.PI);
            return { lon: lon.toFixed(2), lat: lat.toFixed(2) };
        }

        /** RESIZE LOGIC **/
        let isResizing = false;
        document.querySelectorAll('.handle').forEach(h => h.addEventListener('mousedown', e => { isResizing = true; e.preventDefault(); e.stopPropagation(); }));
        window.addEventListener('mousemove', e => {
            if (!isResizing) return;
            CROP_WIDTH = Math.max(50, Math.abs(e.clientX - window.innerWidth/2) * 2);
            CROP_HEIGHT = Math.max(50, Math.abs(e.clientY - window.innerHeight/2) * 2);
            updateCropUI();
        });
        window.addEventListener('mouseup', () => isResizing = false);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            const camera = new BABYLON.ArcRotateCamera("Camera", -Math.PI/2, Math.PI/2, 1, BABYLON.Vector3.Zero(), scene);
            camera.attachControl(canvas, false);
            camera.inputs.removeByType("ArcRotateCameraKeyboardMoveInput");
            camera.angularSensibilityX = -1000; camera.angularSensibilityY = -1000;
            camera.inputs.remove(camera.inputs.attached.mousewheel);
            canvas.addEventListener("wheel", e => { e.preventDefault(); camera.fov = Math.max(0.1, Math.min(1.2, camera.fov + (e.deltaY > 0 ? 0.05 : -0.05))); }, { passive: false });

            centerMarker = BABYLON.MeshBuilder.CreateSphere("centerMarker", {diameter: 10}, scene);
            const markerMat = new BABYLON.StandardMaterial("markerMat", scene);
            markerMat.emissiveColor = new BABYLON.Color3(0, 0.5, 1);
            centerMarker.material = markerMat;
            centerMarker.setEnabled(false);

            canvas.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                if (currentIndex === -1) return;
                const pickInfo = scene.pick(scene.pointerX, scene.pointerY);
                if (pickInfo.hit) {
                    const filename = imageList[currentIndex];
                    const pos = pickInfo.pickedPoint;
                    const radius = pos.length();
                    const beta = Math.acos(pos.y / radius);
                    const alpha = Math.atan2(pos.z, pos.x);
                    customCenters[filename] = { alpha, beta };

                    const deg = getImgDeg(alpha, beta);
                    console.log(`SET CENTER [${filename}]: Lon ${deg.lon}, Lat ${deg.lat}`);

                    updateMarkerVisual(filename);
                    cacheStatus.innerText = "Point Saved";
                }
            });

            createHelperMeshes(scene);
            fetchImageList(scene);
            return { scene, camera };
        };

        function updateMarkerVisual(filename) {
            if (customCenters[filename]) {
                const c = customCenters[filename];
                const radius = 480;
                centerMarker.position.x = radius * Math.sin(c.beta) * Math.cos(c.alpha);
                centerMarker.position.y = radius * Math.cos(c.beta);
                centerMarker.position.z = radius * Math.sin(c.beta) * Math.sin(c.alpha);
                centerMarker.setEnabled(true);
            } else centerMarker.setEnabled(false);
        }

        async function fetchImageList(scene) {
            try {
                const response = await fetch(PROXY_BASE + encodeURIComponent(BASE_DIR_URL));
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                imageList = Array.from(doc.querySelectorAll('a')).map(a => a.getAttribute('href')).filter(h => h && h.toLowerCase().endsWith('.jpg'));
                if (imageList.length > 0) { currentIndex = 0; loadSelectedImage(scene); }
            } catch (e) { filenameDisplay.innerText = "Error list"; }
        }

        function loadSelectedImage(scene, force = false) {
            const filename = imageList[currentIndex];
            filenameDisplay.innerText = filename;
            if (force && textureCache[filename]) { textureCache[filename].dispose(); delete textureCache[filename]; }

            let targetTexture;
            if (textureCache[filename]) {
                targetTexture = textureCache[filename];
                cacheStatus.innerText = "Cache";
            } else {
                const buster = force ? ("&t=" + Date.now()) : "";
                targetTexture = new BABYLON.Texture(PROXY_BASE + encodeURIComponent(BASE_DIR_URL + filename) + buster, scene, false, false);
                textureCache[filename] = targetTexture;
                cacheStatus.innerText = "Download...";
                targetTexture.onLoadObservable.add(() => cacheStatus.innerText = "Ready");
            }
            if (!currentDome) currentDome = new BABYLON.PhotoDome("panorama", "", { resolution: 64, size: 1000 }, scene);
            currentDome.photoTexture = targetTexture;

            updateMarkerVisual(filename);
            if (document.getElementById("centerView").checked && customCenters[filename]) {
                const center = customCenters[filename];
                console.log(`Centering ${filename}: Alpha ${center.alpha}, Beta ${center.beta}`);
                scene.activeCamera.alpha = center.alpha + Math.PI;
                scene.activeCamera.beta = Math.PI - center.beta;
            }
        }

        /** EXPORT / IMPORT LOGIC **/
        document.getElementById("exportBtn").onclick = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(customCenters, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "mars_markers.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        document.getElementById("helpBtn").onclick = () => {
            alert("Right click on image to set a marker. Use Left and Right arrows on keyboard to browse images. Check 'Center' to keep images centered on markers while browsing.");
        }

        document.getElementById("importBtn").onclick = () => document.getElementById("importInput").click();

        document.getElementById("importInput").onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    Object.assign(customCenters, imported);
                    updateMarkerVisual(imageList[currentIndex]);
                    cacheStatus.innerText = "Markers Imported";
                } catch (err) { alert("Error parsing JSON"); }
            };
            reader.readAsText(file);
        };

        function saveCroppedImage() {
            const wasMarkerVisible = centerMarker.isEnabled();
            centerMarker.setEnabled(false); // Hide marker for clean crop

            BABYLON.Tools.CreateScreenshot(engine, scene.activeCamera, { precision: 1 }, (data) => {
                centerMarker.setEnabled(wasMarkerVisible);
                const img = new Image();
                img.onload = () => {
                    const tempCanvas = document.createElement("canvas");
                    const ctx = tempCanvas.getContext("2d");
                    tempCanvas.width = CROP_WIDTH; tempCanvas.height = CROP_HEIGHT;
                    const scaleX = img.width / window.innerWidth, scaleY = img.height / window.innerHeight;
                    const sX = (img.width - (CROP_WIDTH * scaleX)) / 2, sY = (img.height - (CROP_HEIGHT * scaleY)) / 2;
                    ctx.drawImage(img, sX, sY, CROP_WIDTH * scaleX, CROP_HEIGHT * scaleY, 0, 0, CROP_WIDTH, CROP_HEIGHT);
                    const link = document.createElement('a');
                    link.download = "crop_" + (imageList[currentIndex] || "pano.jpg");
                    link.href = tempCanvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                };
                img.src = data;
            });
        }

        window.addEventListener("keydown", (e) => {
            if (imageList.length === 0) return;
            if (e.key === "ArrowLeft") { currentIndex = (currentIndex - 1 + imageList.length) % imageList.length; loadSelectedImage(scene); }
            else if (e.key === "ArrowRight") { currentIndex = (currentIndex + 1) % imageList.length; loadSelectedImage(scene); }
        });

        function createTextLabel(text, position, color, scene, parent) {
            const plane = BABYLON.MeshBuilder.CreatePlane("l"+text, {size: 35}, scene);
            plane.position = position; plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL; plane.parent = parent;
            const dt = new BABYLON.DynamicTexture("d"+text, {width: 256, height: 256}, scene);
            dt.hasAlpha = true; dt.drawText(text, null, null, "bold 80px Arial", color, "transparent", true);
            const mat = new BABYLON.StandardMaterial("m"+text, scene);
            mat.diffuseTexture = dt; mat.specularColor = new BABYLON.Color3(0,0,0); mat.emissiveColor = new BABYLON.Color3(1,1,1); mat.backFaceCulling = false;
            plane.material = mat; return plane;
        }

        function createHelperMeshes(scene) {
            gridParent = new BABYLON.TransformNode("gp", scene);
            const radius = 450;
            for (let lat = -90; lat <= 90; lat += GRID_INTERVAL) {
                const radLat = lat * Math.PI/180, y = radius * Math.sin(radLat), r = radius * Math.cos(radLat), points = [];
                for (let i = 0; i <= 64; i++) points.push(new BABYLON.Vector3(r * Math.cos(i*Math.PI/32), y, r * Math.sin(i*Math.PI/32)));
                const line = BABYLON.MeshBuilder.CreateLines("la"+lat, {points: points}, scene);
                if (lat === 0) { horizonMesh = line; line.color = new BABYLON.Color3(1,0,0); } else { line.parent = gridParent; line.color = new BABYLON.Color3(0.4,0.4,0.4); }
                if (lat !== 0 && lat % 20 === 0 && Math.abs(lat) < 90) createTextLabel(lat+"°", new BABYLON.Vector3(0, y, radius*0.98), "#3498db", scene, gridParent);
            }
            for (let lon = 0; lon < 360; lon += GRID_INTERVAL) {
                const radLon = lon * Math.PI/180, points = [];
                for (let i = -90; i <= 90; i += 5) points.push(new BABYLON.Vector3(radius*Math.cos(i*Math.PI/180)*Math.sin(radLon), radius*Math.sin(i*Math.PI/180), radius*Math.cos(i*Math.PI/180)*Math.cos(radLon)));
                const line = BABYLON.MeshBuilder.CreateLines("lo"+lon, {points: points}, scene);
                line.parent = gridParent; line.color = new BABYLON.Color3(0.4,0.4,0.4);
                if (lon % 20 === 0) createTextLabel(((lon + 180 + GRID_AZIMUTH_OFFSET) % 360)+"°", new BABYLON.Vector3(radius*0.98*Math.sin(radLon), 0, radius*0.98*Math.cos(radLon)), "#fff", scene, gridParent);
            }
            gridParent.setEnabled(false); if(horizonMesh) horizonMesh.setEnabled(false);
        }



/**
 * Esporta una sequenza di PNG per creare un'animazione ping-pong.
 * @param {string} startFileName - Nome del file iniziale (es. "Sol_3560_NR_B_cyl_reduced.jpg")
 * @param {string} endFileName - Nome del file finale
 */

        const { scene, camera } = createScene();
        engine.runRenderLoop(() => {
            scene.render();
            let az = (-camera.alpha - Math.PI / 2) * (180 / Math.PI) + 180;
            compassWrapper.style.transform = `rotate(${az + COMPASS_OFFSET_DEGREES}deg)`;
            let el = -(Math.PI / 2 - camera.beta) * (180 / Math.PI);
            pitchWrapper.style.transform = `rotate(${-el + PITCH_OFFSET_DEGREES}deg)`;
        });

        document.getElementById("reloadBtn").onclick = () => loadSelectedImage(scene, true);
        document.getElementById("prevBtn").onclick = () => { currentIndex = (currentIndex - 1 + imageList.length) % imageList.length; loadSelectedImage(scene); };
        document.getElementById("nextBtn").onclick = () => { currentIndex = (currentIndex + 1) % imageList.length; loadSelectedImage(scene); };
        document.getElementById("showHorizon").onchange = e => { if(horizonMesh) horizonMesh.setEnabled(e.target.checked); };
        document.getElementById("showGrid").onchange = e => gridParent.setEnabled(e.target.checked);
        document.getElementById("showCrop").onchange = e => {
            cropFrame.style.display = e.target.checked ? "block" : "none";
        }
        document.getElementById("saveBtn").onclick = saveCroppedImage;
        window.onresize = () => engine.resize();
    </script>
</body>
</html>
